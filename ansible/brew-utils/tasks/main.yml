---
- name: Install utilities from Homebrew
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  with_items:
    - awscli
    - direnv
    - fnm
    - git-filter-repo
    - hexyl
    - k9s
    - kubernetes-cli
    - lazydocker
    - mc
    - pillow
    - pre-commit
    - prek
    - pstree
    - tldr
    - yazi
    - zoxide
